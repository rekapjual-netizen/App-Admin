name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'  # NAEKIN KE 21

      - uses: android-actions/setup-android@v3

      - name: Decode env from secret
        run: echo "${{ secrets.FIREBASE_ENV_BASE64 }}" | base64 -d > .env

      - run: npm install
      - run: npm run build

      - run: npx cap add android || npx cap sync android
      - run: npx cap sync android

      - name: Set gradle java version
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - run: cd android && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
